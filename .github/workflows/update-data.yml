name: Update Dashboard Data

on:
  schedule:
    # 매일 09:10 KST (00:10 UTC) 실행 — 한국 장 시작 이후, 미국 지표 전일 마감 반영
    - cron: "10 0 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼
  push:
    branches: [main]
    paths: ["collect.py", "requirements.txt"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python collect.py

      - name: Commit data.json
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update data.json ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

